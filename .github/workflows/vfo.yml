name: Update ISD Payment Fishing VietNam

on:
  push:
    branches:
      - vfo

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Update Fishing VietNam
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script_stop: true
        script: |
          # Clone if not exists, otherwise update
          if [ ! -d ~/addons-system/isd_payment ]; then
            git clone git@github.com:IntelliSync-data/isd_payment.git ~/addons-system/isd_payment
            cd ~/addons-system/isd_payment && git checkout vfo
          else
            cd ~/addons-system/isd_payment
            git fetch origin && git reset --hard origin/vfo
          fi
          
          # Sync isd_payment directory with rsync (including deletions)
          sudo rsync -av --delete ~/addons-system/isd_payment/ /opt/custom-addons/
          
          # Restart Odoo service to apply changes
          sudo systemctl restart odoo

    - name: Verify Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sleep 5
          if sudo systemctl is-active --quiet odoo; then
            echo "Odoo restarted successfully"
          else
            echo "Odoo failed to restart"
            sudo systemctl status odoo --no-pager
            exit 1
          fi